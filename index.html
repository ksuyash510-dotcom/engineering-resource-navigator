<style>
* { box-sizing: border-box; font-family: 'Inter', sans-serif; }
body { background: #020617; color: #e5e7eb; margin: 0; padding: 30px; }
h1 { text-align: center; font-size: 2.4rem; }
.subtitle { text-align: center; color: #94a3b8; margin-bottom: 40px; }
.container { max-width: 1100px; margin: auto; }
.section { margin-bottom: 40px; }
.section h2 { color: #38bdf8; margin-bottom: 14px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
.card { background: #020617; border-radius: 14px; padding: 18px; cursor: pointer; border: 1px solid #020617; transition: 0.3s; }
.card:hover { transform: translateY(-6px); border-color: #38bdf8; box-shadow: 0 10px 30px rgba(56,189,248,0.15); }
.card-title { font-weight: 600; }
.card-sub { font-size: 0.8rem; color: #9ca3af; margin-top: 6px; }
.details { background: #020617; border-radius: 16px; padding: 25px; animation: fadeIn 0.4s ease; }
.resource { display: block; padding: 12px; margin-top: 10px; background: #020617; border-radius: 10px; text-decoration: none; color: #38bdf8; border: 1px solid #020617; }
.resource:hover { border-color: #38bdf8; padding-left: 16px; }
@keyframes fadeIn { from {opacity: 0; transform: translateY(10px);} to {opacity: 1; transform: translateY(0);} }
</style>
</head>

</div>

const branchGrid = document.getElementById("branchGrid");
const subjectGrid = document.getElementById("subjectGrid");
const details = document.getElementById("details");

Object.keys(data).forEach(branch => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<div class="card-title">${branch}</div>
                     <div class="card-sub">${data[branch].full}</div>`;
    div.onclick = () => loadSubjects(branch);
    branchGrid.appendChild(div);
});

function loadSubjects(branch) {
    subjectGrid.innerHTML = "";
    details.innerHTML = "";
    Object.keys(data[branch].subjects).forEach(subject => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<div class="card-title">${subject}</div>`;
        div.onclick = () => loadDetails(branch, subject);
        subjectGrid.appendChild(div);
    });
}

function loadDetails(branch, subject) {
    const s = data[branch].subjects[subject];
    details.innerHTML = `
        <div class="details">
            <h2>${subject}</h2>
            <p>${s.info}</p>
            <h3>📚 Useful Resources</h3>
            ${Object.entries(s.links).map(([name, link]) => `<a class="resource" href="${link}" target="_blank">🔗 ${name}</a>`).join("")}
        </div>
    `;
}
